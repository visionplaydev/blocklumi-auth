<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Block Lumi - Redirecting...</title>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; padding: 40px 20px; color: #333; }
        .spinner { display: inline-block; width: 40px; height: 40px; border: 4px solid #eee; border-top-color: #00c300; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <h2>앱으로 돌아가는 중...</h2>
    <p id="status">Opening Block Lumi...</p>
    <script>
        // LINE 인증 콜백의 query string 을 커스텀 스킴으로 전달
        var params = window.location.search || window.location.hash.replace('#', '?');
        var target = "line3rdp.com.vision.blocklumi://line-auth" + params;
        window.location.href = target;
        // 3초 후에도 안 되면 안내 메시지 표시
        setTimeout(function() {
            document.getElementById("status").innerHTML =
                "앱이 자동으로 열리지 않으면 Block Lumi 앱을 열어주세요.";
        }, 3000);
    </script>
</body>
</html>
